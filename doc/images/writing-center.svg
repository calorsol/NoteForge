<svg viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#28231a" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="#eceae3"/>
  <rect x="16" y="16" width="1248" height="688" rx="16" fill="#ffffff" stroke="#e7e3db" filter="url(#shadow)"/>

  <!-- top bar -->
  <g>
    <rect x="40" y="37" width="12" height="12" rx="3" fill="#c2603a"/>
    <text x="60" y="51" font-size="17" font-weight="600" fill="#2b2a28">NoteForge</text>
    <text x="178" y="51" font-size="14" fill="#6b6862">资料库</text>
    <rect x="232" y="35" width="74" height="27" rx="8" fill="#f4e6df"/>
    <text x="242" y="52" font-size="14" fill="#a84d2c">写作中心</text>
    <text x="1240" y="51" font-size="13" fill="#9c988f" text-anchor="end">demo · 退出</text>
    <line x1="16" y1="73" x2="1264" y2="73" stroke="#e7e3db"/>
  </g>

  <!-- left: material drawer -->
  <g>
    <rect x="16" y="73" width="272" height="631" fill="#fbfaf8"/>
    <line x1="288" y1="73" x2="288" y2="704" stroke="#e7e3db"/>
    <text x="40" y="106" font-size="13" font-weight="600" fill="#6b6862">资料</text>
    <rect x="170" y="92" width="100" height="24" rx="7" fill="#ffffff" stroke="#e7e3db"/>
    <text x="182" y="108" font-size="12" fill="#6b6862">今天 06-25</text>

    <rect x="40" y="128" width="224" height="34" rx="10" fill="none" stroke="#c2603a" stroke-dasharray="5 4"/>
    <text x="152" y="150" font-size="13" fill="#a84d2c" text-anchor="middle">+ 添加资料</text>

    <!-- expanded card -->
    <rect x="40" y="176" width="224" height="150" rx="10" fill="#ffffff" stroke="#c2603a"/>
    <path d="M40 186 a10 10 0 0 1 10 -10 h204 a10 10 0 0 1 10 10 v24 h-224 z" fill="#f4e6df"/>
    <text x="54" y="201" font-size="13" font-weight="600" fill="#a84d2c">今日 GDP 数据</text>
    <path d="M242 197 l5 -5 l5 5" fill="none" stroke="#a84d2c" stroke-width="1.6" stroke-linecap="round"/>
    <text x="54" y="234" font-size="14" font-weight="600" fill="#2b2a28">二季度 GDP</text>
    <text x="54" y="258" font-size="12.5" fill="#6b6862">同比增长 5.2%，环比 0.9%。</text>
    <text x="54" y="280" font-size="12.5" fill="#6b6862">• 第三产业贡献率升至 58%</text>
    <text x="54" y="302" font-size="12.5" fill="#6b6862">• 社零总额同比 +4.1%</text>

    <!-- collapsed cards -->
    <rect x="40" y="338" width="224" height="52" rx="10" fill="#ffffff" stroke="#e7e3db"/>
    <text x="54" y="360" font-size="13" font-weight="600" fill="#2b2a28">央行利率会议纪要</text>
    <text x="54" y="378" font-size="11.5" fill="#9c988f">维持政策利率不变，强调稳健灵活。</text>
    <path d="M242 358 l5 5 l5 -5" fill="none" stroke="#9c988f" stroke-width="1.6" stroke-linecap="round"/>

    <rect x="40" y="402" width="224" height="52" rx="10" fill="#ffffff" stroke="#e7e3db"/>
    <text x="54" y="424" font-size="13" font-weight="600" fill="#2b2a28">行业访谈摘录</text>
    <text x="54" y="442" font-size="11.5" fill="#9c988f">受访者认为下半年订单将温和复苏。</text>
    <path d="M242 422 l5 5 l5 -5" fill="none" stroke="#9c988f" stroke-width="1.6" stroke-linecap="round"/>
  </g>

  <!-- middle: editor -->
  <g>
    <line x1="848" y1="73" x2="848" y2="704" stroke="#e7e3db"/>
    <!-- toolbar -->
    <rect x="308" y="89" width="190" height="28" rx="8" fill="#ffffff" stroke="#e7e3db"/>
    <text x="320" y="107" font-size="14" font-weight="600" fill="#2b2a28">二季度经济观察</text>
    <path d="M478 100 l5 5 l5 -5" fill="none" stroke="#9c988f" stroke-width="1.6" stroke-linecap="round"/>

    <text x="556" y="107" font-size="12" fill="#9c988f">342 字</text>
    <text x="612" y="107" font-size="12" fill="#2e7d52">✓ 已保存</text>
    <rect x="676" y="91" width="60" height="24" rx="8" fill="#ffffff" stroke="#e7e3db"/>
    <text x="690" y="107" font-size="12" fill="#6b6862">Aa 外观</text>
    <rect x="746" y="91" width="92" height="24" rx="8" fill="#ffffff" stroke="#e7e3db"/>
    <rect x="746" y="91" width="58" height="24" rx="8" fill="#c2603a"/>
    <text x="752" y="107" font-size="11" fill="#ffffff">Markdown</text>
    <text x="810" y="107" font-size="11" fill="#6b6862">文本</text>
    <line x1="308" y1="133" x2="848" y2="133" stroke="#e7e3db"/>

    <text x="308" y="178" font-size="25" font-weight="700" fill="#2b2a28" font-family="Georgia, 'Songti SC', serif">二季度经济观察</text>

    <text x="308" y="216" font-size="14" fill="#b3aea4">＃ 二季度经济观察</text>
    <text x="308" y="250" font-size="14.5" fill="#2b2a28">从最新数据看，经济呈现稳中向好态势。</text>
    <text x="308" y="278" font-size="14.5" fill="#2b2a28">GDP 同比增长 **5.2%**，略高于预期。</text>
    <text x="308" y="312" font-size="14.5" fill="#2b2a28">结合央行表态，货币政策仍将保持稳健。</text>
    <text x="308" y="344" font-size="14.5" fill="#2b2a28">- 消费温和复苏</text>
    <text x="308" y="368" font-size="14.5" fill="#2b2a28">- 制造业投资回暖</text>
  </g>

  <!-- right: preview -->
  <g>
    <rect x="848" y="73" width="416" height="631" fill="#fbfaf8"/>
    <text x="880" y="130" font-size="21" font-weight="700" fill="#2b2a28" font-family="Georgia, 'Songti SC', serif">二季度经济观察</text>
    <text x="880" y="168" font-size="14.5" fill="#46423b" font-family="Georgia, 'Songti SC', serif">从最新数据看，经济呈现稳中向好态势。</text>
    <text x="880" y="198" font-size="14.5" fill="#46423b" font-family="Georgia, 'Songti SC', serif">GDP 同比增长 <tspan font-weight="700" fill="#2b2a28">5.2%</tspan>，略高于预期。</text>
    <text x="880" y="228" font-size="14.5" fill="#46423b" font-family="Georgia, 'Songti SC', serif">结合央行表态，货币政策仍将保持稳健。</text>
    <text x="880" y="266" font-size="14.5" fill="#46423b" font-family="Georgia, 'Songti SC', serif">• 消费温和复苏</text>
    <text x="880" y="292" font-size="14.5" fill="#46423b" font-family="Georgia, 'Songti SC', serif">• 制造业投资回暖</text>
  </g>
</svg>
